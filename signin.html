<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./css/signin.css">
    <link rel="shortcut icon" href="./assets/jumia_star-removebg-preview.png" type="image/x-icon">
    <title>Jumia</title>
</head>
<body>
    <div class="login-box">
        <img src="./assets/jumia_star-removebg-preview.png" alt="star">
        <h2>Welcome Back !</h2>
        <img src="/assets/prints-removebg-preview.png" alt="" style="width: 100px; height: auto; margin-top: -50px;">
        <p class="text">Log back into your Jumia account.</p>
        
        <input type="password" name="email" id="email" placeholder="Password">
       <a class="btn btn-primary" href="./log in.html" role="button">Continue</a>

        <div class="divider">
            <span>Or log in with</span>
        </div>
        <div class="socials">
            <a href="https://web.facebook.com/jumia.com.ng/?_rdc=1&_rdr#">
                <img src="./assets/facebook.svg" alt="facebook"
                ></a>
            <a href="https://gmail.com/signin">
                <img src="./assets/google.svg" alt="google">
            </a>
        </div>
        <div class="label">
            <p>By continuing you agree to Jumia’s</p>
            <a href="https://my.jumia.com.ng/interaction/3Z-GAymd0pC6_UIjrHWiZ/en-ng/terms-and-conditions">
                Terms and Conditions
            </a>
            <a href="https://www.jumia.com.ng/sp-privacy/">
                Privacy Policy
            </a>
        </div>
        <p class="contact">
            Need help? Visit our Help Center or contact us on 02018881106
        </p>
        <div class="jumia">
            <img src="./assets/jumbg.png" alt="jumia">
        </div>
    </div>
</body>
</html>
